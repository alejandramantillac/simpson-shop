<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="grid.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="normalize.css">
    <title>Simpson's Shop</title>
</head> 
<body>
    <!-- Encabezado -->
    <nav class="fadeInDown">
        <div class="brand_image">
            <img src="/assets/logo.png.crdownload" alt="Logo The Simpsons">
        </div>
        <div class="nav_options">
            <ul>
                <li><a href="">FAQS</a></li>
                <li><a href="">PRODUCTOS</a></li>
            </ul>
        </div>
    </nav>
    <!-- Sección media -->
    <div class="main_section fadeIn">
        <h1>Elige a Marge o a Homero de "Los Simpsons" el día de hoy y el envío de la figura coleccionable será gratuito</h1>
    </div>
    <div class="products">
        <div class="product fadeInUp">
            <div class="content">
                <div class="img_content">
                    <img src="/assets/homero.svg" alt="Homero Simpson">
                </div>
                <h1>Personaje 1</h1>
                <p>Homero Simpson</p>
                <button href="" class = "main_button">Elegir a Homero</a>
            </div>
        </div>
        <div class="product fadeInUp">
            <div class="content">
                <div class="img_content">
                    <img src="/assets/marge.svg" alt="Homero Simpson">
                </div>
                <h1>Personaje 2</h1>
                <p>Marge Simpson</p>
                <button href="" class = "main_button">Elegir a Marge</a>
            </div>
        </div>
    </div>
    <!-- Footer -->
    <footer>
            <div id="options_f_1">Contáctanos</div>
            <div id="options_f_2">Sobre nosotros</div>
            <div id="options_f_3">Blog</div>
    </footer>
    
</body>
</html>
